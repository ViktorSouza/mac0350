{% extends "base.html" %} {% block title %}Home{% endblock %} {% block content
%}
<h2>Welcome</h2>
<p>This is the home page.</p>
<form
	hx-post="/achievements"
	hx-target="#achievement-list"
	hx-swap="beforeend">
	<input
		type="text"
		name="title"
		placeholder="Title"
		required />
	<input
		type="text"
		name="description"
		placeholder="Description"
		required />

	<button type="submit">Create</button>
</form>
<ul id="achievement-list">
	{% for achievement in achievements %}
	{% include "partials/achievement_card.html" with context %}
	</li>

	{% endfor %}
</ul>
{% endblock %}
