<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
</head>
<body>

<h1>Meu Site</h1>

<nav>
    <button hx-get="/aba/curtidas" hx-target="#conteudo" hx-push-url="true">
        Curtidas
    </button>

    <button hx-get="/aba/jupiter" hx-target="#conteudo" hx-push-url="true">
        Júpiter
    </button>

    <button hx-get="/aba/professor" hx-target="#conteudo" hx-push-url="true">
        Professor
    </button>
</nav>

<hr>

<main id="conteudo"
      hx-get="{{ pagina }}"
      hx-trigger="load"
      hx-target="#conteudo">
</main>

<!-- Shortcut -->
<div hx-get="/aba/professor"
     hx-trigger="keyup[shiftKey&&altKey&&(key=='p'||key=='P')] from:body"
     hx-target="#conteudo"
     hx-push-url="true">
</div>

</body>
</html>
